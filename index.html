<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildCrew.AI – V1.5 Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Figtree', 'sans-serif'] } } }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Figtree', sans-serif; background: white; transition: background 0.2s; }

    /* Map – light */
    .map-bg { background: #e9efe4; position: relative; overflow: hidden; }
    .map-bg::before { content: ''; position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.55) 0, rgba(255,255,255,0.55) 1px, transparent 1px, transparent 36px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.55) 0, rgba(255,255,255,0.55) 1px, transparent 1px, transparent 52px); }
    .map-road { position: absolute; background: white; }
    /* Map – dark (mirrors Google Maps night style) */
    .map-bg.dark-map { background: #1c2331; }
    .map-bg.dark-map::before { background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 1px, transparent 1px, transparent 36px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 1px, transparent 1px, transparent 52px); }
    .map-bg.dark-map .map-road { background: #2c3a50; }
    .map-bg.dark-map .map-park  { background: rgba(30,60,30,0.55) !important; }
    .map-bg.dark-map .map-label { color: #8899aa !important; }

    /* Skeleton shimmer */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    body.dark .skeleton { background: linear-gradient(90deg, #2e2d39 25%, #3a3947 50%, #2e2d39 75%);
      background-size: 200% 100%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Animations */
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* Progress bar */
    .progress-anim { animation: prog 4s ease-out forwards; }
    @keyframes prog { 0%{width:0} 40%{width:55%} 70%{width:78%} 85%{width:88%} 100%{width:95%} }

    /* Row hover */
    .trow:hover { background: #fafafa !important; }
    .trow:hover .del-btn { opacity: 1 !important; }
    body.dark .trow:hover { background: #2e2d39 !important; }

    /* Cody gradient button */
    .cody-btn { background: linear-gradient(87deg, #ffbd15 13%, #f4550b 51%, #b600e9 115%); }

    /* Button base — shared transition + min-height */
    .btn-base { transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease; min-height: 38px; }

    /* Tab buttons */
    .tab-btn { background: none; border: none; cursor: pointer; padding: 0; }

    /* Primary button hover */
    .btn-primary:hover { background: #BA3800 !important; }

    /* Secondary / ghost button hover */
    .btn-secondary:hover { background: rgba(39,38,53,0.06) !important; }
    body.dark .btn-secondary:hover { background: rgba(255,255,255,0.07) !important; }

    /* ── AI Chat Panel ─────────────────────────────────────────────── */
    @keyframes chatIn   { from{transform:translateX(110%)} to{transform:translateX(0)} }
    @keyframes chatOut  { from{transform:translateX(0)} to{transform:translateX(110%)} }
    @keyframes msgIn    { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes dotBounce{ 0%,80%,100%{transform:scale(0.7);opacity:0.3} 40%{transform:scale(1.15);opacity:1} }
    @keyframes fabRing  { 0%{box-shadow:0 4px 20px rgba(232,70,0,0.45),0 0 0 0 rgba(232,70,0,0.5)} 70%{box-shadow:0 4px 20px rgba(232,70,0,0.45),0 0 0 14px rgba(232,70,0,0)} 100%{box-shadow:0 4px 20px rgba(232,70,0,0.45),0 0 0 0 rgba(232,70,0,0)} }
    @keyframes fabGlow  { 0%,100%{box-shadow:0 4px 20px rgba(232,70,0,0.4)} 50%{box-shadow:0 6px 28px rgba(232,70,0,0.65)} }
    .chat-enter { animation: chatIn  0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .chat-leave { animation: chatOut 0.28s ease both; }
    .msg-in     { animation: msgIn 0.25s ease both; }
    .dot { width:7px;height:7px;border-radius:50%;display:inline-block;animation:dotBounce 1.1s ease infinite; }
    .dot:nth-child(2) { animation-delay:0.17s; }
    .dot:nth-child(3) { animation-delay:0.34s; }
    .fab-notify { animation: fabRing 2s ease infinite; }
    .fab-idle   { animation: fabGlow 3s ease infinite; }
    .chat-scroll::-webkit-scrollbar { width:3px; }
    .chat-scroll::-webkit-scrollbar-thumb { background:rgba(128,128,128,0.2);border-radius:2px; }
    .chat-sugg:hover { opacity:0.85; }

    /* Checkbox accent */
    input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 16px; height: 16px; min-width: 16px;
      border: 1.5px solid rgba(39,38,53,0.35); border-radius: 3px;
      background: transparent; cursor: pointer; position: relative;
      vertical-align: middle; flex-shrink: 0;
    }
    input[type="checkbox"]:checked {
      background: #e84600; border-color: #e84600;
    }
    input[type="checkbox"]:checked::after {
      content: ''; position: absolute; left: 4px; top: 1px;
      width: 5px; height: 9px;
      border: 2px solid white; border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    body.dark input[type="checkbox"] { border-color: rgba(253,253,253,0.3); }
    body.dark input[type="checkbox"]:checked { background: #e84600; border-color: #e84600; }

    /* Accordion chevron */
    .chev-open { transform: rotate(180deg); transition: transform 0.2s; }
    .chev-closed { transform: rotate(0deg); transition: transform 0.2s; }

    /* ── Skill loading screen animations ── */
    @keyframes sceneBar   { from{width:0} to{width:100%} }
    @keyframes robotPulse { 0%,100%{transform:scale(1) rotate(-2deg)} 50%{transform:scale(1.07) rotate(2deg)} }
    @keyframes scanBeam   { 0%{left:-25%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{left:115%;opacity:0} }
    @keyframes floatUp    { 0%{transform:translateY(0);opacity:0.9} 100%{transform:translateY(-220px);opacity:0} }
    @keyframes orbitA     { from{transform:rotate(0deg)   translateX(90px) rotate(0deg)}   to{transform:rotate(360deg)  translateX(90px)  rotate(-360deg)} }
    @keyframes orbitB     { from{transform:rotate(120deg) translateX(70px) rotate(-120deg)} to{transform:rotate(480deg) translateX(70px)  rotate(-480deg)} }
    @keyframes orbitC     { from{transform:rotate(240deg) translateX(110px) rotate(-240deg)} to{transform:rotate(600deg) translateX(110px) rotate(-600deg)} }
    @keyframes blink      { 0%,85%,100%{opacity:1} 90%,95%{opacity:0.05} }
    @keyframes sceneFade  { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
    @keyframes craneSwing { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
    @keyframes radarPing  { 0%{transform:scale(0.3);opacity:1} 100%{transform:scale(2.2);opacity:0} }
    @keyframes tapeDraw   { from{width:0} to{width:100%} }
    @keyframes spinSlow   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes flagWave   { 0%,100%{transform:skewX(-2deg)} 50%{transform:skewX(6deg)} }
    @keyframes numFly     { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0.4);opacity:0} }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(39,38,53,0.15); border-radius: 3px; }
    body.dark ::-webkit-scrollbar-thumb { background: rgba(253,253,253,0.15); }

    /* Skills cards — stack vertically below 1440px */
    .skills-row { display: flex; gap: 24px; }
    @media (max-width: 1440px) { .skills-row { flex-direction: column; } }

    /* Centered app container */
    #root { display: flex; justify-content: center; }
    .app-wrap { width: 100%; max-width: 2400px; min-height: 100vh; position: relative; }
    /* Full-bleed bars: background spans viewport, inner content stays within 2400px */
    .bar-fullbleed { width: 100vw; margin-left: calc(50% - 50vw); }
    .bar-inner { max-width: 2400px; margin: 0 auto; padding: 0 80px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useRef, useCallback } = React;

    /* ────────────────────────────────────────────
       DESIGN TOKENS – LIGHT
    ──────────────────────────────────────────── */
    const C = {
      brand:  '#e84600',
      nav:    '#272635',
      page:   'white',
      text:   '#272635',
      sub:    '#474747',
      muted:  'rgba(39,38,53,0.4)',
      link:   '#5047f3',
      teal:   '#48c1b5',
      border: 'rgba(39,38,53,0.1)',
      bord25: 'rgba(39,38,53,0.25)',
      card:   '#fdfdfd',
      row:    '#fafafa',

    /* ────────────────────────────────────────────
       DESIGN TOKENS – DARK
    ──────────────────────────────────────────── */
    const D = {
      brand:  '#e84600',
      nav:    '#272635',
      page:   '#23222e',
      text:   '#fdfdfd',
      sub:    '#a7a7a7',
      muted:  'rgba(253,253,253,0.35)',
      link:   '#7b74f5',
      teal:   '#48c1b5',
      border: '#2e2d39',
      bord25: '#474753',
      card:   '#272635',
      row:    '#2e2d39',
    };

    /* ────────────────────────────────────────────
       THEME CONTEXT
    ──────────────────────────────────────────── */
    const ThemeCtx = createContext({ isDark: false, toggleDark: () => {}, bidDivision: null, setBidDivision: () => {} });

    /* ────────────────────────────────────────────
       ICONS (inline SVG helpers)
    ──────────────────────────────────────────── */
    const Icon = {
      back: (

        </svg>
      ),
      search: (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      ),
      sort: (

      chevron: (open) => (

      moon: (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      ),
      sun: (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
        </svg>
      ),
      x: (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/>
        </svg>
      ),
      cody: (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
          <path d="m12 2-2 5.5L4.5 9l5.5 2L12 17l2-5.5 5.5-2L14 7.5 12 2z"/>
          <path d="m19 15-1 3-3 1 3 1 1 3 1-3 3-1-3-1-1-3z"/>
        </svg>
      ),
    };

    /* ────────────────────────────────────────────
       LOGO
    ──────────────────────────────────────────── */
    function Logo() {
      return (
        <svg width="134" height="32" viewBox="0 0 503 121" fill="none" xmlns="http://www.w3.org/2000/svg">

            <path d="M197.01 53.01H202.73V83.74H197.01V78.94C195.17 82.82 190.23 84.53 186.81 84.53C179.11 84.53 174.37 79.4 174.44 70.78V53.01H180.16V70.64C180.16 75.84 183.25 79.13 187.53 79.13C191.81 79.13 196.94 76.56 197.01 69.92V53.01Z" fill="white"/>
            <path d="M211.49 41.69C211.49 39.52 213.33 37.87 215.5 37.87C217.67 37.87 219.58 39.51 219.58 41.69C219.58 43.87 217.74 45.51 215.5 45.51C213.26 45.51 211.49 43.87 211.49 41.69ZM212.67 83.74V53.01H218.39V83.74H212.67Z" fill="white"/>
            <path d="M228.33 83.74V36.3H234.06V83.74H228.33Z" fill="white"/>

            <path d="M282.16 61.17C282.16 48.34 292.36 37.61 305.19 37.61C312.17 37.61 318.22 40.57 322.23 45.31L317.89 49C314.86 45.45 310.26 43.14 305.19 43.14C295.65 43.14 288.15 51.43 288.15 61.17C288.15 70.91 295.65 79 305.19 79C310.26 79 314.86 76.7 317.89 73.14L322.23 76.83C318.22 81.57 312.16 84.53 305.19 84.53C292.36 84.53 282.16 74 282.16 61.17Z" fill="white"/>
            <path d="M349.08 53.41L348.16 58.81C346.52 58.02 344.87 57.76 343.69 57.76C337.57 57.76 335.14 64.41 335.14 72.5V83.75H329.35V53.02H335.14V59.99C336.72 54.59 339.68 52.23 343.76 52.23C345.93 52.23 348.17 52.82 349.09 53.41H349.08Z" fill="white"/>

            <path d="M9.07 70.89V52V46.97L24.75 37.57V28.61V18.67L16.24 23.63L0 33.11V52V70.89V89.13L31.5 107.5V87.95L9.07 75.26V70.89Z" fill="#E84600"/>

            <path d="M50.68 55.12L28.98 43.4L16.67 50.9V70.61L34.94 81.25L50.68 71.96V55.12Z" fill="#E84600"/>
            <path d="M75.58 35.94V31.53V14.63V13.93L54 0.849976L32.42 13.93V14.63V31.53V35.94L54 47.79L75.58 35.94Z" fill="#E84600"/>

            <path d="M75.58 13.93V14.63V31.53V35.94L54 47.79V31.53V14.7V0.849976L75.58 13.93Z" fill="#BB2609"/>

    /* ────────────────────────────────────────────
       NAV BAR
    ──────────────────────────────────────────── */
    function NavBar({ navigate }) {
      const { isDark, toggleDark } = useContext(ThemeCtx);
      return (
        <div className="bar-fullbleed" style={{background: C.nav}}>
        <div className="bar-inner flex items-center h-[64px]">
          <div className="cursor-pointer" onClick={() => navigate('projects')}><Logo /></div>
          <div className="flex flex-1 h-full items-center px-[10px]">
            <div
              className="flex h-full items-center px-[10px] cursor-pointer border-b-2"
              style={{borderColor: 'white'}}
              onClick={() => navigate('projects')}>
              <span style={{color: 'white', fontSize:16, fontWeight:500}}>Projects</span>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <button
              onClick={toggleDark}
              style={{
                color: isDark ? 'white' : 'rgba(255,255,255,0.6)',
                background: 'none', border: 'none', cursor: 'pointer',
                display: 'flex', alignItems: 'center', padding: 4,
                borderRadius: 4, transition: 'color 0.15s',
              }}>
              {isDark ? Icon.sun : Icon.moon}
            </button>
            <div className="w-9 h-9 rounded-full flex items-center justify-center text-[14px] font-medium"
              style={{background:'#5a5969', color:'#f9f9f9'}}>JW</div>
          </div>
        </div>
        </div>
      );
    }

    /* ────────────────────────────────────────────
       BREADCRUMB BAR
    ──────────────────────────────────────────── */
    function Crumbs({ items, right }) {
      const { isDark } = useContext(ThemeCtx);
      const T = isDark ? D : C;
      return (
        <div className="bar-fullbleed border-b" style={{background: isDark ? '#23222E' : T.card, borderColor: T.border}}>
          <div className="bar-inner flex items-center h-[60px]">
            <div className="flex flex-1 items-center gap-2 h-full">
              {items.map((item, i) => (

      const base = `btn-base flex items-center justify-center gap-1 rounded-[8px] font-bold cursor-pointer ${sm ? 'px-4 py-[6px] text-[13px]' : 'px-6 py-[8px] text-[15px]'} ${variantClass} ${className}`;

        secondary: {background: T.card,  color: T.text,  border: `1px solid ${T.bord25}`,  ...(sm ? {} : {minWidth: 200})},
        ghost:     {background: T.card,  color: T.text,  border: `1px solid ${T.bord25}`,  ...(sm ? {} : {minWidth: 200})},
      };
      return <button className={base} style={styles[variant]} onClick={onClick}>{children}</button>;

    function Tabs({ tabs, active, onChange }) {
      const { isDark } = useContext(ThemeCtx);
      const T = isDark ? D : C;
      const [hovered, setHovered] = React.useState(null);
      const tabRefs = React.useRef({});
      const [ind, setInd] = React.useState({ left: 0, width: 0, ready: false });

      const moveTo = React.useCallback((label) => {
        const el = tabRefs.current[label];
        if (el) setInd({ left: el.offsetLeft, width: el.offsetWidth, ready: true });
      }, []);

      React.useEffect(() => { moveTo(hovered || active); }, [hovered, active]);
      React.useEffect(() => { requestAnimationFrame(() => moveTo(active)); }, []);

      return (
        <div className="relative flex gap-6 border-b" style={{borderColor: T.border}}>
          {tabs.map(t => (
            <button key={t}
              ref={el => { tabRefs.current[t] = el; }}
              onClick={() => onChange(t)}
              onMouseEnter={() => setHovered(t)}
              onMouseLeave={() => setHovered(null)}
              className="tab-btn flex flex-col items-start" style={{gap:16}}>
              <span style={{
                fontSize:16, fontWeight:600,
                color: t === active ? T.brand : hovered === t ? '#A7A7A7' : T.text,

      const date = new Date(dateStr);
      const diffMs = PROTOTYPE_NOW - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      let relative = null;
      if (diffMins < 60)                    relative = `${diffMins} Min${diffMins !== 1 ? 's' : ''} Ago`;
      else if (diffHours < 24)              relative = `${diffHours} Hour${diffHours !== 1 ? 's' : ''} Ago`;
      else if (diffDays === 1)              relative = 'Yesterday';
      else if (diffDays > 1 && diffDays < 7) relative = `${diffDays} Days Ago`;
      else if (diffDays >= 7 && diffDays < 14) relative = '1 Week Ago';
      const formatted = date.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
      return { formatted, relative };
    }

      const { isDark } = useContext(ThemeCtx);
      const T = isDark ? D : C;

      const [open,       setOpen]       = useState(false);
      const [panelState, setPanelState] = useState('hidden'); // 'hidden' | 'entering' | 'leaving'
      const [messages,   setMessages]   = useState(null);
      const [input,      setInput]      = useState('');
      const [thinking,   setThinking]   = useState(false);
      const [unread,     setUnread]     = useState(false);
      const bottomRef  = useRef(null);
      const inputRef   = useRef(null);
      const textareaRef = useRef(null);
      const leaveTimer = useRef(null);

      /* Handle open/close with animation */
      useEffect(() => {
        clearTimeout(leaveTimer.current);
        if (open) {
          setPanelState('entering');
          setUnread(false);
          // Initialize on first open
          setMessages(prev => prev ?? [{
            id: 0, role:'ai', streaming:true,
            blocks:[{ type:'text', content:`Hi! I'm your BuildCentral AI assistant. ${getContextGreeting(screen)}` }],
          }]);
          setTimeout(() => inputRef.current?.focus(), 420);
        } else if (panelState !== 'hidden') {
          setPanelState('leaving');
          leaveTimer.current = setTimeout(() => setPanelState('hidden'), 310);
        }
        return () => clearTimeout(leaveTimer.current);
      }, [open]);

      /* Scroll to bottom when messages update */
      useEffect(() => {
        setTimeout(() => bottomRef.current?.scrollIntoView({ behavior:'smooth' }), 40);
      }, [messages, thinking]);

      /* Auto-grow textarea */
      const autoGrow = () => {
        const el = textareaRef.current;
        if (el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
      };

      const sendMessage = useCallback((text) => {
        if (!text.trim() || thinking) return;
        setMessages(prev => [...(prev||[]), { id:Date.now(), role:'user', text:text.trim() }]);
        setInput('');
        if (textareaRef.current) { textareaRef.current.style.height = 'auto'; }
        setThinking(true);
        const delay = 1000 + Math.random() * 700;
        setTimeout(() => {
          const blocks = getAIResponse(text);
          setThinking(false);
          setMessages(prev => [...prev, { id:Date.now()+1, role:'ai', blocks, streaming:true }]);
          if (!open) setUnread(true);
        }, delay);
      }, [thinking, open]);

      const suggestions  = getChatSuggestions(screen);
      const userMsgs     = (messages||[]).filter(m => m.role==='user');
      const panelBg      = isDark ? '#1B1A28' : '#ffffff';
      const divider      = isDark ? 'rgba(255,255,255,0.09)' : 'rgba(0,0,0,0.08)';
      const inputAreaBg  = isDark ? 'rgba(255,255,255,0.07)' : '#f3f3f5';
      const canSend      = input.trim() && !thinking;

      /* ── FAB only (panel hidden) ── */
      if (panelState === 'hidden') return (
        <button
          onClick={() => setOpen(true)}
          className={unread ? 'fab-notify' : 'fab-idle'}
          title="Ask BuildCentral AI"
          style={{
            position:'fixed', bottom:28, right:28, width:56, height:56, zIndex:999,
            borderRadius:'50%', border:'none', cursor:'pointer',
            background:'linear-gradient(135deg, #e84600 0%, #c43a00 100%)',
            color:'white', display:'flex', alignItems:'center', justifyContent:'center',
            transition:'transform 0.18s ease',
          }}
          onMouseEnter={e=>e.currentTarget.style.transform='scale(1.1)'}
          onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
        >
          <svg width="23" height="23" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="white" strokeWidth="1.8" fill="rgba(255,255,255,0.18)"/>
            <path d="M9.5 10.5h.01M12 10.5h.01M14.5 10.5h.01" stroke="white" strokeWidth="2.5" strokeLinecap="round"/>
          </svg>
          {unread && <span style={{position:'absolute',top:9,right:9,width:9,height:9,borderRadius:'50%',background:'#4ade80',border:'2px solid #e84600'}}/>}
        </button>
      );

      return (
        <>
          {/* Backdrop */}
          <div onClick={() => setOpen(false)} style={{
            position:'fixed', inset:0, zIndex:997,
            background: isDark ? 'rgba(0,0,0,0.5)' : 'rgba(0,0,0,0.18)',
            opacity: panelState==='entering' ? 1 : 0,
            transition:'opacity 0.3s ease', pointerEvents:'auto',
          }}/>

          {/* Panel */}
          <div className={panelState==='entering' ? 'chat-enter' : 'chat-leave'} style={{
            position:'fixed', top:0, right:0, bottom:0, width:440, zIndex:998,
            background:panelBg, borderLeft:`1px solid ${divider}`,
            boxShadow:'-16px 0 64px rgba(0,0,0,0.28)',
            display:'flex', flexDirection:'column',
          }}>

            {/* Header */}
            <div style={{
              display:'flex', alignItems:'center', justifyContent:'space-between',
              padding:'0 20px', height:64, borderBottom:`1px solid ${divider}`,
              background: isDark?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.015)', flexShrink:0,
            }}>
              <div className="flex items-center gap-3">
                <div style={{
                  width:38, height:38, borderRadius:11, flexShrink:0,
                  background:'linear-gradient(135deg, #e84600 0%, #9b3dff 100%)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  boxShadow:'0 3px 14px rgba(232,70,0,0.38)',
                }}>
                  <span style={{fontSize:18, color:'white', lineHeight:1}}>✦</span>
                </div>
                <div>
                  <div style={{fontSize:14, fontWeight:700, color:T.text, lineHeight:'1.2'}}>BuildCentral AI</div>
                  <div style={{display:'flex', alignItems:'center', gap:6, marginTop:2}}>
                    <span style={{width:7, height:7, borderRadius:'50%', background:'#4ade80', display:'inline-block', flexShrink:0, boxShadow:'0 0 6px rgba(74,222,128,0.7)'}}/>
                    <span style={{fontSize:12, color:T.muted}}>Project Alpha · Online</span>
                  </div>
                </div>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <button onClick={()=>{
                  setMessages([{
                    id: Date.now(), role:'ai', streaming:true,
                    blocks:[{ type:'text', content:`Hi! I'm your BuildCentral AI assistant. ${getContextGreeting(screen)}` }],
                  }]);
                  setThinking(false);
                  setInput('');
                  setTimeout(()=>inputRef.current?.focus(), 50);
                }} title="New chat" style={{
                  width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center',
                  background:'none', border:`1px solid ${divider}`, borderRadius:7,
                  cursor:'pointer', color:T.muted, transition:'border-color 0.15s, color 0.15s',
                }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=T.bord25;e.currentTarget.style.color=T.text;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=divider;e.currentTarget.style.color=T.muted;}}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 5H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/>
                  </svg>
                </button>
                <button onClick={()=>setOpen(false)} title="Close" style={{
                  width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center',
                  background:'none', border:`1px solid ${divider}`, borderRadius:7,
                  cursor:'pointer', color:T.muted, transition:'border-color 0.15s, color 0.15s',
                }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=T.bord25;e.currentTarget.style.color=T.text;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=divider;e.currentTarget.style.color=T.muted;}}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
              </div>
            </div>

            {/* Messages */}
            <div className="chat-scroll flex-1 overflow-y-auto" style={{padding:'20px 16px 12px', scrollbarWidth:'thin'}}>
              {(messages||[]).map(msg => (
                <div key={msg.id} style={{marginBottom:20}}>
                  {msg.role==='user' ? (
                    <div style={{display:'flex', justifyContent:'flex-end'}}>
                      <div className="msg-in" style={{
                        background:'linear-gradient(135deg, #e84600, #c43a00)',
                        color:'white', fontSize:13.5, lineHeight:'1.55',
                        padding:'10px 14px', borderRadius:'14px 14px 3px 14px',
                        maxWidth:'82%', boxShadow:'0 2px 12px rgba(232,70,0,0.3)',
                      }}>{msg.text}</div>
                    </div>
                  ) : (
                    <div style={{display:'flex', gap:10, alignItems:'flex-start'}}>
                      <div style={{
                        width:26, height:26, borderRadius:7, flexShrink:0, marginTop:1,
                        background:'linear-gradient(135deg, #e84600, #9b3dff)',
                        display:'flex', alignItems:'center', justifyContent:'center',
                      }}>
                        <span style={{fontSize:12, color:'white'}}>✦</span>
                      </div>
                      <div style={{flex:1, minWidth:0}}>
                        <ChatBlocks blocks={msg.blocks} streaming={msg.streaming} onFollowup={sendMessage}/>
                      </div>
                    </div>
                  )}
                </div>
              ))}

              {/* Thinking indicator */}
              {thinking && (
                <div style={{display:'flex', gap:10, alignItems:'center', marginBottom:16}}>
                  <div className="msg-in" style={{
                    width:26, height:26, borderRadius:7, flexShrink:0,
                    background:'linear-gradient(135deg, #e84600, #9b3dff)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                  }}>
                    <span style={{fontSize:12, color:'white'}}>✦</span>
                  </div>
                  <div className="msg-in flex items-center gap-1.5" style={{
                    padding:'10px 14px', borderRadius:'12px 12px 12px 3px',
                    background:isDark?'rgba(255,255,255,0.07)':'#f0f0f3',
                    border:`1px solid ${divider}`,
                  }}>
                    <span className="dot" style={{background:T.sub}}/>
                    <span className="dot" style={{background:T.sub}}/>
                    <span className="dot" style={{background:T.sub}}/>
                  </div>
                </div>
              )}
              <div ref={bottomRef}/>
            </div>

            {/* Suggested questions (before first user message) */}
            {userMsgs.length===0 && !thinking && (
              <div style={{padding:'0 16px 12px', flexShrink:0}}>
                <p style={{fontSize:10.5,fontWeight:700,color:T.muted,textTransform:'uppercase',letterSpacing:'0.07em',margin:'0 0 8px'}}>
                  Suggested questions
                </p>
                <div style={{display:'flex', flexDirection:'column', gap:7}}>
                  {suggestions.map((s,i) => (
                    <button key={i} onClick={()=>sendMessage(s)} className="chat-sugg text-left" style={{
                      fontSize:13, color:T.text, background:T.card,
                      border:`1px solid ${T.bord25}`, borderRadius:8,
                      padding:'9px 12px', cursor:'pointer', fontFamily:'inherit',
                      fontWeight:500, lineHeight:'1.4', transition:'opacity 0.15s',
                      display:'block', width:'100%',
                    }}>{s}</button>
                  ))}
                </div>
              </div>
            )}

            {/* Input area */}
            <div style={{padding:'12px 16px 16px', borderTop:`1px solid ${divider}`, flexShrink:0}}>
              <div style={{
                display:'flex', alignItems:'flex-end', gap:8,
                background:inputAreaBg, border:`1px solid ${T.bord25}`,
                borderRadius:12, padding:'8px 8px 8px 12px',
                transition:'border-color 0.15s',
              }}
                onFocusCapture={e=>e.currentTarget.style.borderColor=T.bord25}
              >
                <textarea
                  ref={el=>{inputRef.current=el;textareaRef.current=el;}}
                  value={input}
                  onChange={e=>{setInput(e.target.value);autoGrow();}}
                  onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(input);}}}
                  placeholder="Ask anything about your project…"
                  rows={1}
                  style={{
                    flex:1, fontSize:13.5, color:T.text, background:'transparent',
                    border:'none', outline:'none', resize:'none', lineHeight:'1.55',
                    fontFamily:'inherit', maxHeight:120, overflowY:'auto',
                    padding:0,
                  }}
                />
                <button onClick={()=>sendMessage(input)} disabled={!canSend} style={{
                  width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center',
                  borderRadius:9, border:'none', flexShrink:0, cursor:canSend?'pointer':'default',
                  background:canSend?'linear-gradient(135deg,#e84600,#c43a00)':(isDark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.08)'),
                  color:canSend?'white':T.muted,
                  boxShadow:canSend?'0 2px 10px rgba(232,70,0,0.35)':'none',
                  transition:'all 0.18s ease',
                }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                  </svg>
                </button>
              </div>
              <p style={{fontSize:11,color:T.muted,margin:'7px 0 0',textAlign:'center',opacity:0.55,lineHeight:'1.3'}}>
                ✦ BuildCentral AI · Responses are illustrative
              </p>
            </div>
          </div>

          {/* FAB shows X when panel open */}
          <button onClick={()=>setOpen(false)} style={{
            position:'fixed', bottom:28, right:28, width:56, height:56, zIndex:999,
            borderRadius:'50%', border:'none', cursor:'pointer',
            background:'linear-gradient(135deg,#e84600,#c43a00)',
            color:'white', display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow:'0 4px 20px rgba(232,70,0,0.4)',
            transition:'transform 0.18s ease',
          }}
            onMouseEnter={e=>e.currentTarget.style.transform='scale(1.1)'}
            onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
          >
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </>
      );
    }

    /* ──────────────────────────────────────────────────────────────────
       APP ROUTER
    ────────────────────────────────────────────────────────────────── */
    function App() {
      const [screen, setScreen] = useState('projects');
      const [darkMode, setDarkMode] = useState(true);
      const [bidDivision, setBidDivision] = useState(null);
      const [bidResultsFrom, setBidResultsFrom] = useState('bidFiles');

      const navigate = s => { setScreen(s); window.scrollTo(0, 0); };
      const toggleDark = () => setDarkMode(d => !d);

      useEffect(() => {
        document.body.className = darkMode ? 'dark' : '';
        document.body.style.background = darkMode ? D.page : 'white';
      }, [darkMode]);

      const screens = {
        projects:     <ProjectsScreen     navigate={navigate}/>,
        upload:       <UploadScreen       navigate={navigate}/>,
        loading:      <LoadingScreen      navigate={navigate}/>,
        projectHome:  <ProjectHomeScreen  navigate={navigate}/>,
        romLoading:   <ROMLoadingScreen   navigate={navigate}/>,
        rom:          <ROMScreen          navigate={navigate}/>,
        rfiLoading:   <RFILoadingScreen   navigate={navigate}/>,
        rfi:          <RFIScreen          navigate={navigate}/>,
        bidDivision:  <BidDivisionScreen  navigate={navigate}/>,
        bidFiles:     <BidFilesScreen     navigate={navigate}/>,
        bidLoading:   <BidLoadingScreen   navigate={navigate}/>,
        bidResults:   <BidResultsScreen   navigate={navigate}/>,
      };

      return (
        <ThemeCtx.Provider value={{ isDark: darkMode, toggleDark, bidDivision, setBidDivision, bidResultsFrom, setBidResultsFrom }}>
          <div className="app-wrap">
            {screens[screen] || screens.projects}
          </div>
          <ChatContainer screen={screen} />
        </ThemeCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildCrew.AI – V1.5 Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Figtree', 'sans-serif'] } } }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Figtree', sans-serif; background: white; transition: background 0.2s; }

    /* Map – light */
    .map-bg { background: #e9efe4; position: relative; overflow: hidden; }
    .map-bg::before { content: ''; position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.55) 0, rgba(255,255,255,0.55) 1px, transparent 1px, transparent 36px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.55) 0, rgba(255,255,255,0.55) 1px, transparent 1px, transparent 52px); }
    .map-road { position: absolute; background: white; }
    /* Map – dark (mirrors Google Maps night style) */
    .map-bg.dark-map { background: #1c2331; }
    .map-bg.dark-map::before { background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 1px, transparent 1px, transparent 36px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 1px, transparent 1px, transparent 52px); }
    .map-bg.dark-map .map-road { background: #2c3a50; }
    .map-bg.dark-map .map-park  { background: rgba(30,60,30,0.55) !important; }
    .map-bg.dark-map .map-label { color: #8899aa !important; }

    /* Skeleton shimmer */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    body.dark .skeleton { background: linear-gradient(90deg, #2e2d39 25%, #3a3947 50%, #2e2d39 75%);
      background-size: 200% 100%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Animations */
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* Progress bar */
    .progress-anim { animation: prog 4s ease-out forwards; }
    @keyframes prog { 0%{width:0} 40%{width:55%} 70%{width:78%} 85%{width:88%} 100%{width:95%} }

    /* Row hover */
    .trow:hover { background: #fafafa !important; }
    .trow:hover .del-btn { opacity: 1 !important; }
    body.dark .trow:hover { background: #2e2d39 !important; }

    /* Cody gradient button */
    .cody-btn { background: linear-gradient(87deg, #ffbd15 13%, #f4550b 51%, #b600e9 115%); }

    /* Checkbox accent */
    input[type="checkbox"] { accent-color: #e84600; cursor: pointer; }

    /* Accordion chevron */
    .chev-open { transform: rotate(180deg); transition: transform 0.2s; }
    .chev-closed { transform: rotate(0deg); transition: transform 0.2s; }

    /* ── Skill loading screen animations ── */
    @keyframes sceneBar   { from{width:0} to{width:100%} }
    @keyframes robotPulse { 0%,100%{transform:scale(1) rotate(-2deg)} 50%{transform:scale(1.07) rotate(2deg)} }
    @keyframes scanBeam   { 0%{left:-25%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{left:115%;opacity:0} }
    @keyframes floatUp    { 0%{transform:translateY(0);opacity:0.9} 100%{transform:translateY(-220px);opacity:0} }
    @keyframes orbitA     { from{transform:rotate(0deg)   translateX(90px) rotate(0deg)}   to{transform:rotate(360deg)  translateX(90px)  rotate(-360deg)} }
    @keyframes orbitB     { from{transform:rotate(120deg) translateX(70px) rotate(-120deg)} to{transform:rotate(480deg) translateX(70px)  rotate(-480deg)} }
    @keyframes orbitC     { from{transform:rotate(240deg) translateX(110px) rotate(-240deg)} to{transform:rotate(600deg) translateX(110px) rotate(-600deg)} }
    @keyframes blink      { 0%,85%,100%{opacity:1} 90%,95%{opacity:0.05} }
    @keyframes sceneFade  { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
    @keyframes craneSwing { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
    @keyframes radarPing  { 0%{transform:scale(0.3);opacity:1} 100%{transform:scale(2.2);opacity:0} }
    @keyframes tapeDraw   { from{width:0} to{width:100%} }
    @keyframes spinSlow   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes flagWave   { 0%,100%{transform:skewX(-2deg)} 50%{transform:skewX(6deg)} }
    @keyframes numFly     { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0.4);opacity:0} }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(39,38,53,0.15); border-radius: 3px; }
    body.dark ::-webkit-scrollbar-thumb { background: rgba(253,253,253,0.15); }

    /* Skills cards — stack vertically below 1440px */
    .skills-row { display: flex; gap: 24px; }
    @media (max-width: 1440px) { .skills-row { flex-direction: column; } }

    /* Centered app container */
    #root { display: flex; justify-content: center; }
    .app-wrap { width: 100%; max-width: 2400px; min-height: 100vh; position: relative; }
    /* Full-bleed bars: background spans viewport, inner content stays within 2400px */
    .bar-fullbleed { width: 100vw; margin-left: calc(50% - 50vw); }
    .bar-inner { max-width: 2400px; margin: 0 auto; padding: 0 80px; }
  </style>
</head>

  <div id="root"></div>
  <script type="text/babel">

    /* ────────────────────────────────────────────
       ICONS (inline SVG helpers)

            <path d="M282.16 61.17C282.16 48.34 292.36 37.61 305.19 37.61C312.17 37.61 318.22 40.57 322.23 45.31L317.89 49C314.86 45.45 310.26 43.14 305.19 43.14C295.65 43.14 288.15 51.43 288.15 61.17C288.15 70.91 295.65 79 305.19 79C310.26 79 314.86 76.7 317.89 73.14L322.23 76.83C318.22 81.57 312.16 84.53 305.19 84.53C292.36 84.53 282.16 74 282.16 61.17Z" fill="white"/>
            <path d="M349.08 53.41L348.16 58.81C346.52 58.02 344.87 57.76 343.69 57.76C337.57 57.76 335.14 64.41 335.14 72.5V83.75H329.35V53.02H335.14V59.99C336.72 54.59 339.68 52.23 343.76 52.23C345.93 52.23 348.17 52.82 349.09 53.41H349.08Z" fill="white"/>

            <path d="M75.58 13.93V14.63V31.53V35.94L54 47.79V31.53V14.7V0.849976L75.58 13.93Z" fill="#BB2609"/>

    /* ────────────────────────────────────────────
       NAV BAR
    ──────────────────────────────────────────── */
    function NavBar({ navigate }) {
      const { isDark, toggleDark } = useContext(ThemeCtx);
      return (
        <div className="bar-fullbleed" style={{background: C.nav}}>
        <div className="bar-inner flex items-center h-[64px]">
          <div className="cursor-pointer" onClick={() => navigate('projects')}><Logo /></div>
          <div className="flex flex-1 h-full items-center px-[10px]">
            <div
              className="flex h-full items-center px-[10px] cursor-pointer border-b-2"
              style={{borderColor: 'white'}}
              onClick={() => navigate('projects')}>
              <span style={{color: 'white', fontSize:16, fontWeight:500}}>Projects</span>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <button
              onClick={toggleDark}
              style={{
                color: isDark ? 'white' : 'rgba(255,255,255,0.6)',
                background: 'none', border: 'none', cursor: 'pointer',
                display: 'flex', alignItems: 'center', padding: 4,
                borderRadius: 4, transition: 'color 0.15s',
              }}>
              {isDark ? Icon.sun : Icon.moon}
            </button>
            <div className="w-9 h-9 rounded-full flex items-center justify-center text-[14px] font-medium"
              style={{background:'#5a5969', color:'#f9f9f9'}}>JW</div>
          </div>
        </div>
        </div>
      );
    }

    /* ────────────────────────────────────────────
       BREADCRUMB BAR
    ──────────────────────────────────────────── */
    function Crumbs({ items, right }) {
      const { isDark } = useContext(ThemeCtx);
      const T = isDark ? D : C;
      return (
        <div className="bar-fullbleed border-b" style={{background: isDark ? '#23222E' : T.card, borderColor: T.border}}>
          <div className="bar-inner flex items-center h-[60px]">
            <div className="flex flex-1 items-center gap-2 h-full">
              {items.map((item, i) => (
                <React.Fragment key={i}>
                  {i > 0 && <span style={{color: T.sub, fontSize:16}}>{'>'}</span>}
                  <div className={`flex items-center py-[10px] ${item.onClick ? 'cursor-pointer hover:underline' : ''}`}
                    onClick={item.onClick}>
                    <span style={{color: T.sub, fontSize:16}}>{item.label}</span>
                  </div>
                </React.Fragment>
              ))}
            </div>
            {right}
          </div>
        </div>
      );
    }

    /* ────────────────────────────────────────────
       BUTTON
    ──────────────────────────────────────────── */
    function Btn({ children, variant='primary', onClick, sm, className='' }) {
      const { isDark } = useContext(ThemeCtx);
      const T = isDark ? D : C;
      const base = `flex items-center justify-center gap-1 rounded-[8px] font-bold cursor-pointer ${sm ? 'px-4 py-[6px] text-[13px]' : 'px-6 py-[8px] text-[15px]'} ${className}`;
      const styles = {
        primary:   {background: T.brand, color: 'white', border: 'none',                   ...(sm ? {} : {minWidth: 200})},
        secondary: {background: T.card,  color: T.text,  border: `1px solid ${T.bord25}`,  ...(sm ? {} : {minWidth: 200})},
        ghost:     {background: T.card,  color: T.text,  border: `1px solid ${T.bord25}`,  ...(sm ? {} : {minWidth: 200})},
      };
      return <button className={base} style={styles[variant]} onClick={onClick}>{children}</button>;
    }

    /* ────────────────────────────────────────────
       TABS
    ──────────────────────────────────────────── */
    function Tabs({ tabs, active, onChange }) {
      const { isDark } = useContext(ThemeCtx);
      const T = isDark ? D : C;
      return (
        <div className="flex gap-6 border-b" style={{borderColor: T.border}}>
          {tabs.map(t => (
            <button key={t} onClick={() => onChange(t)} className="flex flex-col gap-4 items-start">
              <span style={{color: t === active ? T.brand : T.text, fontSize:16, fontWeight:600}}>{t}</span>
              <div style={{height:2, background: t === active ? T.brand : 'transparent',
                width:'100%', marginBottom:-1, borderRadius:1}} />
            </button>
          ))}
        </div>
      );
    }

    /* ────────────────────────────────────────────
       SKILL LOADING SCREEN (animated scenes)
    ──────────────────────────────────────────── */
    const ROM_SCENES = [
      {
        duration: 4000,
        bg: 'linear-gradient(145deg, #0f0e1a 0%, #1a1035 50%, #0e1a2a 100%)',
        accentColor: '#5047f3',
        emoji: '🤖',
        headline: 'Blueprint Recon',
        caption: 'Decoding your drawings faster than any intern ever could.',
        tag: 'Analyzing documents…',
        anim: 'scan',
      },
      {
        duration: 4000,
        bg: 'linear-gradient(145deg, #0a1a12 0%, #0f2a1a 50%, #0a1820 100%)',
        accentColor: '#48c1b5',
        emoji: '🏗️',
        headline: 'Quantity Takeoff',
        caption: 'Every cubic yard of concrete and every light fixture — counted, priced, and accounted for.',
        tag: 'Running takeoffs…',
        anim: 'crane',
      },
      {
        duration: 3500,

                </div>
                {SCOPE_ITEMS.map((row,i) => (
                  <div key={i} className="flex px-6 py-3 border-b items-center"
                    style={{borderColor:T.border, minWidth:800,
                      background: row.highlight ? (isDark ? 'rgba(72,193,181,0.05)' : 'rgba(72,193,181,0.03)') : (i%2===0 ? T.page : (isDark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.01)')) }}>
                    <span style={{flex:1, fontSize:14, fontWeight: row.bold ? 700 : 400,
                      color: row.bold ? T.text : T.sub}}>{row.item}</span>
                    {[row.thermalTech, row.ewing, row.apex, row.summit].map((val,j) => {
                      const isRec = j===0;
                      const isOut = j===3;
                      return (
                        <span key={j} style={{width:colW, flexShrink:0, fontSize:14, textAlign:'right',
                          fontWeight: row.bold ? 700 : 400,
                          color: row.highlight ? (isRec ? T.teal : isOut ? '#b45309' : T.text)
                               : row.bold ? T.text : T.sub}}>
                          {val}
                        </span>
                      );
                    })}
                  </div>
                ))}
              </div>

              {/* Table 2: Exclusions */}
              <h2 style={{fontSize:20, fontWeight:700, color:T.text, margin:'0 0 4px'}}>Bid Exclusions & Inclusions</h2>
              <p style={{fontSize:15, color:T.muted, margin:'0 0 20px', lineHeight:'22px'}}>
                Items explicitly included or excluded in each bidder's submission. Items marked * require follow-up or clarification.
              </p>
              <div className="rounded-[8px] border overflow-hidden" style={{borderColor:T.bord25, overflowX:'auto'}}>
                <div className="flex px-6 py-3 border-b" style={{background:T.card, borderColor:T.border, minWidth:800}}>
                  <span style={{flex:1, fontSize:13, fontWeight:700, color:T.text}}>Item</span>
                  {companies.map(c => {
                    const isRec = c === 'ThermalTech Solutions';
                    const isOut = c === 'Summit Mechanical';
                    return (
                      <span key={c} style={{width:colW, flexShrink:0, fontSize:13, fontWeight:700, textAlign:'right',
                        color: isRec ? T.teal : isOut ? '#b45309' : T.text}}>
                        {c.split(' ')[0]}
                      </span>
                    );
                  })}
                </div>
                {EXCLUSIONS.map((row,i) => (
                  <div key={i} className="flex px-6 py-3 border-b items-center"
                    style={{borderColor:T.border, minWidth:800,
                      background: i%2===0 ? T.page : (isDark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.01)')}}>
                    <span style={{flex:1, fontSize:14, color:T.sub}}>{row.item}</span>
                    {[row.thermalTech, row.ewing, row.apex, row.summit].map((val,j) => (
                      <span key={j} style={{width:colW, flexShrink:0, fontSize:13, textAlign:'right',
                        fontWeight: val.includes('*') || val === 'Excluded' ? 600 : 400,
                        color: cellColor(val)}}>
                        {val}
                      </span>
                    ))}
                  </div>
                ))}
              </div>
              <p style={{fontSize:13, color:T.muted, marginTop:10}}>* Requires clarification or scope review before award.</p>

            </div>
          )}

          {/* ══ DETAILED ANALYSIS ══ */}
          {tab === 'Detailed Analysis' && (
            <div style={{padding:'48px 80px 80px'}}>
              <p style={{fontSize:15, color:T.muted, margin:'0 0 28px', lineHeight:'22px'}}>
                Detailed position on each bidder's submission. Select a bidder to expand their full analysis.
              </p>

              <div style={{borderTop:`1px solid ${T.border}`}}>
                {DETAILED_ANALYSIS.map((b, i) => {
                  const isOpen  = openBidder === i;
                  const isRec   = b.flag === 'recommended';
                  const isOut   = b.flag === 'outlier';
                  return (
                    <div key={i} style={{borderBottom:`1px solid ${T.border}`}}>
                      {/* Accordion header */}
                      <div className="flex items-center gap-4 py-5" style={{cursor:'pointer'}}
                        onClick={() => setOpenBidder(isOpen ? null : i)}>
                        {chevronSvg(isOpen)}
                        <span style={{flex:1, fontSize:18, fontWeight:700, color:T.text}}>{b.company}</span>
                        {isRec && <span style={{fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:20,
                          background:'rgba(72,193,181,0.15)',color:T.teal}}>Recommended</span>}
                        {isOut && <span style={{fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:20,
                          background:'rgba(245,158,11,0.12)',color:'#b45309'}}>Outlier</span>}
                        <span style={{fontSize:14, color:T.muted}}>{b.summary}</span>
                      </div>
                      {/* Accordion body */}
                      {isOpen && (
                        <div style={{paddingBottom:28, paddingLeft:26, display:'flex', flexDirection:'column', gap:14}}>
                          {b.paragraphs.map((p, pi) => (
                            <p key={pi} style={{fontSize:15, lineHeight:'26px', color:T.sub, margin:0}}>{p}</p>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

            </div>
          )}

        </div>
      );
    }

    /* ──────────────────────────────────────────────────────────────────
       APP ROUTER
    ────────────────────────────────────────────────────────────────── */
    function App() {
      const [screen, setScreen] = useState('projects');
      const [darkMode, setDarkMode] = useState(false);
      const [bidDivision, setBidDivision] = useState(null);

      const navigate = s => { setScreen(s); window.scrollTo(0, 0); };
      const toggleDark = () => setDarkMode(d => !d);

      useEffect(() => {
        document.body.className = darkMode ? 'dark' : '';
        document.body.style.background = darkMode ? D.page : 'white';
      }, [darkMode]);

      const screens = {
        projects:     <ProjectsScreen     navigate={navigate}/>,
        upload:       <UploadScreen       navigate={navigate}/>,
        loading:      <LoadingScreen      navigate={navigate}/>,
        projectHome:  <ProjectHomeScreen  navigate={navigate}/>,
        romLoading:   <ROMLoadingScreen   navigate={navigate}/>,
        rom:          <ROMScreen          navigate={navigate}/>,
        rfiLoading:   <RFILoadingScreen   navigate={navigate}/>,
        rfi:          <RFIScreen          navigate={navigate}/>,
        bidDivision:  <BidDivisionScreen  navigate={navigate}/>,
        bidFiles:     <BidFilesScreen     navigate={navigate}/>,
        bidLoading:   <BidLoadingScreen   navigate={navigate}/>,
        bidResults:   <BidResultsScreen   navigate={navigate}/>,
      };

      return (
        <ThemeCtx.Provider value={{ isDark: darkMode, toggleDark, bidDivision, setBidDivision }}>
          <div className="app-wrap">
            {screens[screen] || screens.projects}
          </div>
        </ThemeCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
